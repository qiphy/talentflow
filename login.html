<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TalentFlow — Login</title>
  <link rel="stylesheet" href="design.css">
  <script src="theme.js"></script>
</head>
<body>

  <div class="auth-card">
    <div class="auth-header">
      <div style="display: flex; justify-content: flex-end;">
        <button id="themeToggle" onclick="toggleTheme()" style="background: none; border: 1.5px solid var(--color-border-tertiary); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px;">
          🌙
        </button>
      </div>
      <h1 class="logo-main" style="color: var(--color-text-primary);">TalentFlow</h1>
      <p style="color: var(--color-text-secondary);">Your first step to the workplace</p>
    </div>

    <div class="role-toggle">
  <button id="btnEmployer" class="active" onclick="setRole('employer')">Employer</button>
  <button id="btnEmployee" onclick="setRole('employee')">Employee</button>
</div>

    <div id="notif"></div>

    <h2 id="formTitle" style="font-size: 18px; margin-bottom: 8px; color: var(--color-text-primary);">Welcome, Employer</h2>
    <p id="formSubtitle" style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 20px;">Sign in to manage your team.</p>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div id="employerField" class="form-group">
        <label class="form-label">Company Name</label>
        <select id="company" class="form-select">
          <option value="">-- Select your company --</option>
          <option>Acme Corporation</option>
          <option>Global Tech Ltd.</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Work Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@company.com" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pass-container" style="display: flex; gap: 5px;">
          <input type="password" id="password" class="form-input" placeholder="••••••••" required/>
          <button type="button" id="togglePass" class="back-btn" onclick="togglePassword()" style="padding: 0 10px; font-size: 11px; white-space: nowrap;">Show</button>
        </div>
      </div>

      <div style="font-size: 13px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
        <label style="color: var(--color-text-secondary); display: flex; align-items: center; gap: 5px;">
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="#" onclick="forgotPassword(event)" style="color: #378ADD; text-decoration: none;">Forgot password?</a>
      </div>

      <button type="submit" id="btnLogin" class="btn-primary">Login</button>
    </form>
    
    <p style="text-align: center; font-size: 13px; margin-top: 20px; color: var(--color-text-secondary);">
      Don't have an account? <a href="signup.html" style="color: #378ADD; font-weight: 600;">Sign Up</a>
    </p>
  </div>

  <script>
    let currentRole = 'employer';

    function setRole(role) {
      currentRole = role;
      
      // Update Button UI
      document.getElementById('btnEmployer').classList.toggle('active', role === 'employer');
      document.getElementById('btnEmployee').classList.toggle('active', role === 'employee');
      
      // Update Text and Fields
      const formTitle = document.getElementById('formTitle');
      const formSubtitle = document.getElementById('formSubtitle');
      const employerField = document.getElementById('employerField');

      if (role === 'employer') {
        formTitle.textContent = 'Welcome, Employer';
        formSubtitle.textContent = 'Sign in to manage your team.';
        employerField.style.display = 'block';
      } else {
        formTitle.textContent = 'Welcome, Employee';
        formSubtitle.textContent = 'Sign in to access your dashboard.';
        employerField.style.display = 'none';
      }
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('togglePass');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const notif = document.getElementById('notif');

      if (!email || !pass) {
        notif.textContent = "Please enter both email and password.";
        notif.style.color = "red";
        return;
      }

      const btn = document.getElementById('btnLogin');
      btn.textContent = "Logging in...";
      btn.disabled = true;

      // Fake delay for effect
      setTimeout(() => {
        window.location.href = "index.html"; // Redirect to your dashboard
      }, 1500);
    }

    function forgotPassword(e) {
      e.preventDefault();
      alert("Password reset link sent to your email!");
    }
  </script>
</body>
</html>
