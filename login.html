<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TalentFlow — Login</title>
  <link rel="stylesheet" href="design.css">
  <script src="theme.js"></script>
</head>
<body>

  <div class="auth-card">
    <div class="auth-header">
      <div style="display: flex; justify-content: flex-end;">
        <button id="themeToggle" onclick="toggleTheme()" style="background: none; border: 1.5px solid var(--color-border-tertiary); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px;">
          🌙
        </button>
      </div>
      <h1 class="logo-main" style="color: var(--color-text-primary);">TalentFlow</h1>
      <p style="color: var(--color-text-secondary);">Your first step to the workplace</p>
    </div>

    <div class="role-toggle">
  <button id="btnEmployer" class="active" onclick="setRole('employer')">Employer</button>
  <button id="btnEmployee" onclick="setRole('employee')">Employee</button>
</div>

    <div id="notif"></div>

    <h2 id="formTitle" style="font-size: 18px; margin-bottom: 8px; color: var(--color-text-primary);">Welcome, Employer</h2>
    <p id="formSubtitle" style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 20px;">Sign in to manage your team.</p>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div id="employerField" class="form-group">
        <label class="form-label">Company Name</label>
          <select id="company" class="form-select">
            <option value="">-- Select your company --</option>
            </select>
      </div>

      <div class="form-group">
        <label class="form-label">Work Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@company.com" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pass-container" style="display: flex; gap: 5px;">
          <input type="password" id="password" class="form-input" placeholder="••••••••" required/>
          <button type="button" id="togglePass" class="back-btn" onclick="togglePassword()" style="padding: 0 10px; font-size: 11px; white-space: nowrap;">Show</button>
        </div>
      </div>

      <div style="font-size: 13px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
        <label style="color: var(--color-text-secondary); display: flex; align-items: center; gap: 5px;">
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="#" onclick="forgotPassword(event)" style="color: #378ADD; text-decoration: none;">Forgot password?</a>
      </div>

      <button type="submit" id="btnLogin" class="btn-primary">Login</button>
    </form>
    
    <p style="text-align: center; font-size: 13px; margin-top: 20px; color: var(--color-text-secondary);">
      Don't have an account? <a href="signup.html" style="color: #378ADD; font-weight: 600;">Sign Up</a>
    </p>
  </div>

  <script>
    let currentRole = 'employer';
    const IS_PREVIEW_MODE = true;

function setRole(role) {
    // Now strictly using 'employer' or 'employee'
    currentRole = role; 
    
    document.getElementById('btnEmployer').classList.toggle('active', role === 'employer');
    document.getElementById('btnEmployee').classList.toggle('active', role === 'employee');
    
    const formTitle = document.getElementById('formTitle');
    const formSubtitle = document.getElementById('formSubtitle');
    const employerField = document.getElementById('employerField');

    if (role === 'employer') {
        formTitle.textContent = 'Welcome, Employer';
        formSubtitle.textContent = 'Sign in to manage your team.';
        employerField.style.display = 'block';
    } else {
        formTitle.textContent = 'Welcome, Employee';
        formSubtitle.textContent = 'Sign in to manage your application.';
        employerField.style.display = 'none';
    }
}

async function handleLogin(e) {
    e.preventDefault();
    
    const selectedRole = currentRole; 
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const company = document.getElementById('company').value;

    // --- NEW VALIDATION LOGIC ---
    if (selectedRole === 'employer' && !company) {
        showNotif("Please select your company.", "error");
        return; // Stop the function here
    }
    // ----------------------------

    const payload = {
        email: email,
        password: password,
        role: selectedRole,
        company: company // Include company in the payload for the backend
    };

    try {
        const response = await fetch('http://127.0.0.1:8000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (response.ok) {
            showNotif("Login successful!", "success");
            window.location.href = `http://127.0.0.1:5500/${result.redirect}.html`;
        } else {
            showNotif(result.detail || "Unauthorized access.", "error");
        }
    } catch (err) {
        showNotif("Backend unreachable.", "error");
    }
}

    function showNotif(msg, type) {
        const notif = document.getElementById('notif');
        notif.textContent = msg;
        notif.style.display = "block";
        notif.style.padding = "10px";
        notif.style.borderRadius = "5px";
        notif.style.marginBottom = "15px";
        notif.style.fontSize = "13px";
        notif.style.textAlign = "center";
        
        if (type === "error") {
            notif.style.backgroundColor = "#fee2e2";
            notif.style.color = "#b91c1c";
        } else {
            notif.style.backgroundColor = "#dcfce7";
            notif.style.color = "#15803d";
        }
    }

    function togglePassword() {
        const input = document.getElementById('password');
        const btn = document.getElementById('togglePass');
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.textContent = input.type === 'password' ? 'Show' : 'Hide';
    }

    // --- NEW: Dynamic Company Loader ---
async function loadCompanies() {
    const companySelect = document.getElementById('company');
    try {
        const response = await fetch('http://127.0.0.1:8000/companies');
        const companies = await response.json();

        console.log("Companies received from backend:", companies);

        if (response.ok) {
            // Keep the first placeholder option, clear others
            companySelect.innerHTML = '<option value="">-- Select your company --</option>';
            
            companies.forEach(company => {
                const opt = document.createElement('option');
                opt.value = company;
                opt.textContent = company;
                companySelect.appendChild(opt);
            });
        }
    } catch (err) {
        console.error("Failed to load companies:", err);
        // Fallback or error message if needed
    }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', loadCompanies);
  </script>
</body>
</html>
