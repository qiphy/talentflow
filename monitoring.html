<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentFlow — Activity Log</title>
    <link rel="stylesheet" href="design.css">
    <link rel="stylesheet" href="navbar.css">
    <script src="theme.js" defer></script>

    <script>
    (function () {
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = saved || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
    })();
    </script>
</head>

<style>
  /* ============================================================
     ACTIVITY LOG (THEME-INTEGRATED)
     ============================================================ */

h2 {
  text-align: center;
  margin-bottom: 24px;
  width: 100%;
  max-width: 900px;
}

.monitoring-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.activity-log {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 14px;
  width: 100%;
  max-width: 900px;
  margin: 0 auto 24px;
  font-family: var(--font-sans);
}

.edge-case-log .activity-log-title {
  color: #BA7517;
}

.activity-log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.activity-log-list {
  max-height: 60vh;
  overflow-y: auto;
  padding-right: 4px;
}

.activity-log-list::-webkit-scrollbar {
  width: 8px;
}

.activity-log-list::-webkit-scrollbar-thumb {
  background: var(--color-border-secondary);
  border-radius: 999px;
}

.activity-log-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.activity-log-btn {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: var(--border-radius-md);
  border: 1px solid var(--color-border-secondary);
  background: var(--color-background-secondary);
  color: var(--color-text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
}

.activity-log-btn:hover {
  background: var(--color-background-tertiary);
  color: var(--color-text-primary);
}

/* Layout for both logs */
.log-row {
  display: flex;
  gap: 20px;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

/* 60% main activity log */
.main-log {
  flex: 6;
}

/* 40% edge case log */
.edge-case-log {
  flex: 4;
  border-left: 3px solid #BA7517;
}

/* Make logs fill their columns */
.main-log,
.edge-case-log {
  width: 100%;
  margin: 0;
}

/* Caption under title */
.activity-log-caption {
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin-top: 2px;
}

/* Divider between header and content */
.activity-log-divider {
  width: 100%;
  height: 1px;
  background: var(--color-border-tertiary);
  margin: 10px 0 12px 0;
}

.activity-log-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

/* ITEM */
.activity-item {
  display: flex;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--border-radius-sm);
  border-bottom: 0.5px solid var(--color-border-tertiary);
  transition: background 0.15s ease, transform 0.1s ease;
}

.activity-item:hover {
  background: var(--color-background-secondary);
  transform: translateX(2px);
}

.activity-item:last-child {
  border-bottom: none;
}

.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

/* DOT TYPES (using your palette system) */
.dot-info {
  background: #378ADD;
}

.dot-warning {
  background: #BA7517;
}

.dot-error {
  background: #A32D2D;
}

.dot-success {
  background: #1D9E75;
}

.activity-text {
  font-size: 13px;
  color: var(--color-text-primary);
  line-height: 1.4;
}

.activity-time {
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin-top: 2px;
}
</style>

<div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">TalentFlow</div>
      <div class="logo-sub">GLM Monitoring System</div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-label">Employer Workspace</div>
      <div class="nav-item" onclick="window.location.href='employerHome.html'">
        <div class="nav-dot dot-red"></div>
        <span>Homepage</span>
      </div>
      <div class="nav-item" onclick="window.location.href='candidate.html'">
        <div class="nav-dot dot-gray"></div>
        <span>Candidates</span>
      </div>

      <div class="nav-label">Monitoring</div>
      <div class="nav-item active" onclick="window.location.href='monitoring.html'">
        <div class="nav-dot dot-amber"></div> 
        <span>Activity Log</span>
      </div>

      <div class="nav-label">Settings</div>
      <div class="nav-item" onclick="window.location.href='employerAcc.html'">
        <div class="nav-dot dot-teal"></div> 
        <span>Account</span>
      </div>
    </div>

</div>


<body>
    <div class="app">
        <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
        <div class="page-title" id="pageTitle">Activity Log</div>
        <div class="topbar-right">
            <button id="themeToggle" onclick="toggleTheme()" style="background: none; border: 1.5px solid var(--color-border-tertiary); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px;">
          🌙
        </button>
        </div>
        </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="monitoring-container">
          <br><br>
          <div class="log-row">
            
            <!-- Main Activity Log (60%) -->
            <div class="activity-log main-log">
              <div class="activity-log-header">
                <div>
                  <div class="activity-log-title">GLM Activity Log</div>
                  <div class="activity-log-caption">System events generated by the GLM</div>
                </div>
                <button class="activity-log-btn" onclick="refreshActivityLog()">Refresh</button>
              </div>
              
              <div class="activity-log-divider"></div>

              <div class="activity-log-list">
                <div id="activity-log-list"></div>
              </div>
            </div>

            <!-- Edge Case Log (40%) -->
             <div class="activity-log edge-case-log">
              <div class="activity-log-header">
                <div>
                  <div class="activity-log-title">Edge Case Monitor</div>
                  <div class="activity-log-caption">Exceptions that require manual attention</div>
                </div>

                <button class="activity-log-btn" onclick="refreshEdgeCases()">Refresh</button>
              </div>

              <div class="activity-log-divider"></div>
              <div class="activity-log-list">
                <div id="edge-case-list"></div>
              </div>
            </div>

          </div>
        </div>
    </div>

      </div>
  </div>
</body>

<script>
const activityData = [
  { type: "info", text: "User Aisha Tan was onboarded", time: "2 min ago" },
  { type: "warning", text: "Missing IC document detected", time: "20 min ago" },
  { type: "success", text: "GitHub access provisioned", time: "1 hr ago" },
  { type: "error", text: "AWS provisioning failed", time: "2 hr ago" },
  { type: "info", text: "User John Doe was offboarded", time: "5 hr ago" },
  { type: "success", text: "Email account created for Aisha Tan", time: "6 hr ago" },
  { type: "warning", text: "Pending document verification for User B", time: "8 hr ago" },
  { type: "error", text: "Failed to provision Slack access for User C", time: "10 hr ago" },
  { type: "info", text: "User D was onboarded", time: "12 hr ago" },
  { type: "success", text: "GitHub access provisioned for User D", time: "13 hr ago" },
  { type: "warning", text: "Missing contact number for User E", time: "15 hr ago" },
  { type: "error", text: "AWS provisioning failed for User F", time: "18 hr ago" },
  { type: "info", text: "User G was offboarded", time: "20 hr ago" },
  { type: "success", text: "Email account deactivated for User G", time: "21 hr ago" },
  { type: "warning", text: "Pending document verification for User H", time: "22 hr ago" },
  { type: "error", text: "Failed to provision Slack access for User I", time: "23 hr ago" },
];

const edgeCaseData = [
  { type: "warning", text: "Ambiguous candidate match detected", time: "3 min ago" },
  { type: "error", text: "Resume upload failed (file corrupted)", time: "12 min ago" },
  { type: "warning", text: "Missing IC document for User L", time: "30 min ago" },
  { type: "error", text: "Duplicate application detected", time: "1 hr ago" },
  { type: "warning", text: "Ambiguous name record for Tan Wei Ming", time: "2 hr ago" }
];

function renderActivityLog() {
  const container = document.getElementById("activity-log-list");

  container.innerHTML = activityData
    .map(item => `
      <div class="activity-item">
        <div class="activity-dot dot-${item.type}"></div>
        <div>
          <div class="activity-text">${item.text}</div>
          <div class="activity-time">${item.time}</div>
        </div>
      </div>
    `)
    .join("");
}

function renderEdgeCases() {
  const container = document.getElementById("edge-case-list");

  container.innerHTML = edgeCaseData
    .map(item => `
      <div class="activity-item">
        <div class="activity-dot dot-${item.type}"></div>
        <div>
          <div class="activity-text">${item.text}</div>
          <div class="activity-time">${item.time}</div>
        </div>
      </div>
    `)
    .join("");
}

function refreshActivityLog() {renderActivityLog();}
function refreshEdgeCases() {renderEdgeCases();}

renderActivityLog();
renderEdgeCases();

</script>

</html>
