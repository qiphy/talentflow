<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentFlow — Activity Log</title>
    <link rel="stylesheet" href="design.css">
    <script src="theme.js" defer></script>

    <script>
    (function () {
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = saved || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
    })();
    </script>

</head>

<style>
/* ================================
   SIDEBAR LAYOUT
================================ */

body {
      display: block;
      padding: 0;
      min-height: 100vh;
      background: var(--color-background-tertiary);
    }

    /* ============================================================
       APP SHELL
       ============================================================ */
    .app {
      display: flex;
      min-height: 100vh;
    }

    /* ============================================================
       SIDEBAR
       ============================================================ */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--color-background-primary);
      border-right: 1px solid var(--color-border-tertiary);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-logo {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--color-border-tertiary);
      margin-bottom: 12px;
    }

    .sidebar-logo .logo-mark {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--color-text-primary);
    }

    .sidebar-logo .logo-sub {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 3px;
    }

    .sidebar-nav {
      padding: 0 12px;
      flex: 1;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-tertiary);
      padding: 16px 8px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--border-radius-md);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
    }

    .nav-item.active {
      background: #1a2a3a;
      color: #4a9eff;
    }

    .nav-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-purple { background: #a855f7; }
    .dot-blue   { background: #4a9eff; }
    .dot-teal   { background: #2dd4bf; }
    .dot-amber  { background: #f59e0b; }

    /* ============================================================
       MAIN AREA
       ============================================================ */
    .main {
      flex: 1;
      margin-left: 240px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ============================================================
       TOPBAR
       ============================================================ */
    .topbar {
      background: var(--color-background-primary);
      border-bottom: 1px solid var(--color-border-tertiary);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
      flex-shrink: 0;
    }

    .page-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--color-text-primary);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Theme toggle button */
    .theme-toggle-btn {
      background: var(--color-background-secondary);
      border: 1px solid var(--color-border-secondary);
      color: var(--color-text-primary);
      padding: 6px 12px;
      border-radius: var(--border-radius-md);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-sans);
    }

    .theme-toggle-btn:hover {
      background: var(--color-background-tertiary);
      transform: scale(1.05);
    }

    /* ============================================================
       CONTENT
       ============================================================ */
    .content {
      flex: 1;
      padding: 32px;
      display: flex;
      justify-content: center;
    }

    .view {
      display: none;
      width: 100%;
      max-width: 860px;
    }

    .view.active { display: block; }


    /* ============================================================
   ACTIVITY LOG (THEME-INTEGRATED)
   ============================================================ */

h2 {
  text-align: center;
  margin-bottom: 24px;
  width: 100%;
  max-width: 900px;
}

.monitoring-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.activity-log {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 14px;
  width: min(60vw, 900px);
  margin: 0 auto 24px;
  font-family: var(--font-sans);
}

.activity-log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.activity-log-list {
  max-height: 60vh;
  overflow-y: auto;
  padding-right: 4px;
}

.activity-log-list::-webkit-scrollbar {
  width: 8px;
}

.activity-log-list::-webkit-scrollbar-thumb {
  background: var(--color-border-secondary);
  border-radius: 999px;
}

.activity-log-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.activity-log-btn {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: var(--border-radius-md);
  border: 1px solid var(--color-border-secondary);
  background: var(--color-background-secondary);
  color: var(--color-text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
}

.activity-log-btn:hover {
  background: var(--color-background-tertiary);
  color: var(--color-text-primary);
}

/* ITEM */
.activity-item {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}

.activity-item:last-child {
  border-bottom: none;
}

.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

/* DOT TYPES (using your palette system) */
.dot-info {
  background: #378ADD;
}

.dot-warning {
  background: #BA7517;
}

.dot-error {
  background: #A32D2D;
}

.dot-success {
  background: #1D9E75;
}

.activity-text {
  font-size: 13px;
  color: var(--color-text-primary);
  line-height: 1.4;
}

.activity-time {
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin-top: 2px;
}
</style>

<div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">TalentFlow</div>
      <div class="logo-sub">Job Application System</div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-label">Workspace</div>
      <div class="nav-item" onclick="window.location.href='candidatehome.html'">
        <div class="nav-dot dot-purple"></div> New Intake
      </div>
      <div class="nav-item" onclick="window.location.href='candidatehome.html'">
        <div class="nav-dot dot-blue"></div> Monitor Applications
      </div>

      <div class="nav-label">Workspace</div>
      <div class="nav-item" onclick="window.location.href='account.html'">
        <div class="nav-dot dot-teal"></div> Account
      </div>
      <div class="nav-item active" onclick="window.location.href='monitoring.html'">
        <div class="nav-dot dot-teal"></div> Activity Log
      </div>
    </div>

</div>


<body>
    <div class="app">
        <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
        <div class="page-title" id="pageTitle">Activity Log</div>
        <div class="topbar-right">
            <button class="theme-toggle-btn" id="themeToggle">🌙</button>
        </div>
        </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="monitoring-container">
            <h2>Activity Log</h2>
            <div class="activity-log">
            <div class="activity-log-header">
                <div class="activity-log-title">GLM Activity Log</div>
            <button class="activity-log-btn" onclick="refreshActivityLog()"> Refresh </button>
            </div>
            <div class="activity-log-list">
                <div id="activity-log-list"></div>
            </div>
            </div>
        </div>
    </div>
        </div>
    </div>
</body>

<script>
    const activityData = [
  { type: "info", text: "User Aisha Tan was onboarded", time: "2 min ago" },
  { type: "warning", text: "Missing IC document detected", time: "20 min ago" },
  { type: "success", text: "GitHub access provisioned", time: "1 hr ago" },
  { type: "error", text: "AWS provisioning failed", time: "2 hr ago" },
  { type: "info", text: "User John Doe was offboarded", time: "5 hr ago" },
  { type: "success", text: "Email account created for Aisha Tan", time: "6 hr ago" },
  { type: "warning", text: "Pending document verification for User B", time: "8 hr ago" },
  { type: "error", text: "Failed to provision Slack access for User C", time: "10 hr ago" },
  { type: "info", text: "User D was onboarded", time: "12 hr ago" },
  { type: "success", text: "GitHub access provisioned for User D", time: "13 hr ago" },
  { type: "warning", text: "Missing contact number for User E", time: "15 hr ago" },
  { type: "error", text: "AWS provisioning failed for User F", time: "18 hr ago" },
  { type: "info", text: "User G was offboarded", time: "20 hr ago" },
  { type: "success", text: "Email account deactivated for User G", time: "21 hr ago" },
  { type: "warning", text: "Pending document verification for User H", time: "22 hr ago" },
  { type: "error", text: "Failed to provision Slack access for User I", time: "23 hr ago" },
];

function renderActivityLog() {
  const container = document.getElementById("activity-log-list");

  container.innerHTML = activityData
    .map(item => `
      <div class="activity-item">
        <div class="activity-dot dot-${item.type}"></div>
        <div>
          <div class="activity-text">${item.text}</div>
          <div class="activity-time">${item.time}</div>
        </div>
      </div>
    `)
    .join("");
}

function refreshActivityLog() {
  renderActivityLog();
}

renderActivityLog();

document.addEventListener('DOMContentLoaded', function() {
  const themeBtn = document.getElementById('themeToggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', function() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      if (current === 'dark') {
        html.setAttribute('data-theme', 'light');
        this.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        this.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    });
  }
});
</script>

</html>
