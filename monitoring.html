<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentFlow — Activity Log</title>
    <link rel="stylesheet" href="design.css">
    <link rel="stylesheet" href="navbar.css">
    <script src="theme.js" defer></script>

    <script>
    (function () {
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = saved || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
    })();
    </script>
</head>

<style>
  /* ============================================================
     ACTIVITY LOG (THEME-INTEGRATED)
     ============================================================ */

h2 {
  text-align: center;
  margin-bottom: 24px;
  width: 100%;
  max-width: 900px;
}

.monitoring-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.activity-log {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 14px;
  width: 100%;
  max-width: 900px;
  margin: 0 auto 24px;
  font-family: var(--font-sans);
}

.edge-case-log .activity-log-title {
  color: #BA7517;
}

.activity-log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.activity-log-list {
  max-height: 60vh;
  overflow-y: auto;
  padding-right: 4px;
}

.activity-log-list::-webkit-scrollbar {
  width: 8px;
}

.activity-log-list::-webkit-scrollbar-thumb {
  background: var(--color-border-secondary);
  border-radius: 999px;
}

.activity-log-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.activity-log-btn {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: var(--border-radius-md);
  border: 1px solid var(--color-border-secondary);
  background: var(--color-background-secondary);
  color: var(--color-text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
}

.activity-log-btn:hover {
  background: var(--color-background-tertiary);
  color: var(--color-text-primary);
}

/* Layout for both logs */
.log-row {
  display: flex;
  gap: 20px;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

/* 60% main activity log */
.main-log {
  flex: 6;
}

/* 40% edge case log */
.edge-case-log {
  flex: 4;
  border-left: 3px solid #BA7517;
}

/* Make logs fill their columns */
.main-log,
.edge-case-log {
  width: 100%;
  margin: 0;
}

/* Caption under title */
.activity-log-caption {
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin-top: 2px;
}

/* Divider between header and content */
.activity-log-divider {
  width: 100%;
  height: 1px;
  background: var(--color-border-tertiary);
  margin: 10px 0 12px 0;
}

.activity-log-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

/* ITEM */
.activity-item {
  display: flex;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--border-radius-sm);
  border-bottom: 0.5px solid var(--color-border-tertiary);
  transition: background 0.15s ease, transform 0.1s ease;
}

.activity-item:hover {
  background: var(--color-background-secondary);
  transform: translateX(2px);
}

.activity-item:last-child {
  border-bottom: none;
}

.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

/* DOT TYPES (using your palette system) */
.dot-info {
  background: #378ADD;
}

.dot-warning {
  background: #BA7517;
}

.dot-error {
  background: #A32D2D;
}

.dot-success {
  background: #1D9E75;
}

.activity-text {
  font-size: 13px;
  color: var(--color-text-primary);
  line-height: 1.4;
}

.activity-time {
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin-top: 2px;
}

/* 1. Define the entry animation */
@keyframes logEntry {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 2. Apply it to the activity items */
.activity-item {
  display: flex;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--border-radius-sm);
  border-bottom: 0.5px solid var(--color-border-tertiary);
  transition: background 0.15s ease;
  
  /* TRIGGER: Animate every time a new item is rendered */
  animation: logEntry 0.4s ease forwards;
}

/* 3. Staggered reveal for that "system scanning" feel */
.activity-item:nth-child(1) { animation-delay: 0.05s; }
.activity-item:nth-child(2) { animation-delay: 0.1s; }
.activity-item:nth-child(3) { animation-delay: 0.15s; }
</style>

<div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">TalentFlow</div>
      <div class="logo-sub">GLM Monitoring System</div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-label">Employer Workspace</div>
      <div class="nav-item" onclick="window.location.href='employerHome.html'">
        <div class="nav-dot dot-red"></div>
        <span>Homepage</span>
      </div>
      <div class="nav-item" onclick="window.location.href='candidate.html'">
        <div class="nav-dot dot-gray"></div>
        <span>Candidates</span>
      </div>

      <div class="nav-label">Monitoring</div>
      <div class="nav-item active" onclick="window.location.href='monitoring.html'">
        <div class="nav-dot dot-amber"></div> 
        <span>Activity Log</span>
      </div>

      <div class="nav-label">Settings</div>
      <div class="nav-item" onclick="window.location.href='employerAcc.html'">
        <div class="nav-dot dot-teal"></div> 
        <span>Account</span>
      </div>
    </div>

</div>


<body>
    <div class="app">
        <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
        <div class="page-title" id="pageTitle">Activity Log</div>
        <div class="topbar-right">
            <button id="themeToggle" onclick="toggleTheme()" style="background: none; border: 1.5px solid var(--color-border-tertiary); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px;">
          🌙
        </button>
        </div>
        </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="monitoring-container">
          <br><br>
          <div class="log-row">
            
            <!-- Main Activity Log (60%) -->
            <div class="activity-log main-log">
              <div class="activity-log-header">
                <div>
                  <div class="activity-log-title">GLM Activity Log</div>
                  <div class="activity-log-caption">System events generated by the GLM</div>
                </div>
                <button class="activity-log-btn" onclick="refreshActivityLog()">Refresh</button>
              </div>
              
              <div class="activity-log-divider"></div>

              <div class="activity-log-list">
                <div id="activity-log-list"></div>
              </div>
            </div>

            <!-- Edge Case Log (40%) -->
             <div class="activity-log edge-case-log">
              <div class="activity-log-header">
                <div>
                  <div class="activity-log-title">Edge Case Monitor</div>
                  <div class="activity-log-caption">Exceptions that require manual attention</div>
                </div>

                <button class="activity-log-btn" onclick="refreshEdgeCases()">Refresh</button>
              </div>

              <div class="activity-log-divider"></div>
              <div class="activity-log-list">
                <div id="edge-case-list"></div>
              </div>
            </div>

          </div>
        </div>
    </div>

      </div>
  </div>
</body>

<script>
/* ── CONFIG & AUTH ── */
const API_BASE = "http://127.0.0.1:8000";

/**
 * INITIALIZATION
 */
document.addEventListener("DOMContentLoaded", async () => {
  const authenticated = await checkAuth();
  if (authenticated) {
    fetchMonitoringData();
    // Auto-refresh every 60 seconds for real-time feel
    setInterval(fetchMonitoringData, 60000);
  }
});

/**
 * AUTH GATEKEEPER
 */
async function checkAuth() {
  try {
    const resp = await fetch(`${API_BASE}/me`, {
      method: "GET",
      credentials: "include",
    });
    if (resp.ok) return true;
    window.location.href = "login.html";
    return false;
  } catch (err) {
    console.error("Auth Connection Error:", err);
    window.location.href = "login.html";
    return false;
  }
}

/**
 * DATA FETCHING
 */
async function fetchMonitoringData() {
  try {
    const response = await fetch(`${API_BASE}/monitoring/logs`, {
      method: "GET",
      credentials: "include",
    });

    if (!response.ok) throw new Error("Failed to fetch logs");

    const logs = await response.json();
    renderLogs(logs);
  } catch (err) {
    console.error("Monitoring Fetch Error:", err);
    showErrorState();
  }
}

/**
 * RENDER ENGINE
 */
function renderLogs(logs) {
  const activityContainer = document.getElementById("activity-log-list");
  const edgeCaseContainer = document.getElementById("edge-case-list");

  if (!activityContainer || !edgeCaseContainer) return;

  // 1. Separate Logs by Category
  // 'info' and 'success' go to Activity Log
  // 'warning' and 'error' go to Edge Cases
  const activityLogs = logs.filter(l => l.category === 'info' || l.category === 'success');
  const edgeCases = logs.filter(l => l.category === 'warning' || l.category === 'error');

  // 2. Render Activity Stream
  activityContainer.innerHTML = activityLogs.length 
    ? activityLogs.map(item => renderItem(item)).join("") 
    : `<div class="activity-time">No recent activity detected.</div>`;

  // 3. Render Edge Case Stream
  edgeCaseContainer.innerHTML = edgeCases.length 
    ? edgeCases.map(item => renderItem(item, true)).join("") 
    : `<div class="activity-time">System health optimal. No edge cases detected.</div>`;
}

/**
 * ITEM TEMPLATE
 */
function renderItem(item, isEdgeCase = false) {
  // Map backend categories to your CSS dot classes
  const typeClass = item.category || 'info'; 
  
  return `
    <div class="activity-item">
      <div class="activity-dot dot-${typeClass}"></div>
      <div style="flex: 1;">
        <div class="activity-text">${item.description}</div>
        
        ${item.ai_note ? `
          <div style="margin-top: 4px; font-size: 11px; color: #a855f7; font-weight: 600; display: flex; align-items: center; gap: 4px;">
            <span>✦ GLM Insight:</span>
            <span style="font-weight: 400; color: var(--color-text-tertiary);">${item.ai_note}</span>
          </div>
        ` : ''}
        
        <div class="activity-time">${formatTimeAgo(item.created_at)}</div>
      </div>
    </div>
  `;
}

/**
 * UI HELPERS
 */
function formatTimeAgo(dateStr) {
  if (!dateStr) return "Just now";
  const date = new Date(dateStr);
  const now = new Date();
  const diffInMinutes = Math.floor((now - date) / (1000 * 60));

  if (diffInMinutes < 1) return "Just now";
  if (diffInMinutes < 60) return `${diffInMinutes} min ago`;
  if (diffInMinutes < 1440) return `${Math.floor(diffInMinutes / 60)} hr ago`;
  return `${Math.floor(diffInMinutes / 1440)} days ago`;
}

function showErrorState() {
  const containers = ["activity-log-list", "edge-case-list"];
  containers.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = `<div class="activity-time" style="color: #ef4444;">⚠️ Connection lost to Monitoring Service.</div>`;
  });
}

/**
 * REFRESH TRIGGERS (For manual button calls)
 */
function refreshActivityLog() { fetchMonitoringData(); }
function refreshEdgeCases() { fetchMonitoringData(); }

</script>

</html>
