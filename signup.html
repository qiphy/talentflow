<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TalentFlow — Sign Up</title>
  <link rel="stylesheet" href="design.css">
  <script src="theme.js"></script>
</head>
<body>

  <div class="auth-card">
    <div class="auth-header">
      <div class="theme-btn-wrapper" style="display: flex; justify-content: flex-end;">
         <button id="themeToggle" onclick="toggleTheme()" style="background: none; border: 1.5px solid var(--color-border-tertiary); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px;">
                  🌙
              </button>
      </div>
      <h1 class="logo-main">TalentFlow</h1>
      <p>Your first step to the workplace</p>
    </div>

    <div class="role-toggle">
      <button id="btnEmployer" class="active" onclick="setRole('employer')">Employer</button>
      <button id="btnEmployee" onclick="setRole('employee')">Employee</button>
    </div>

    <div id="notif"></div>

    <h2 id="formTitle">Register as Employer</h2>
    <p style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 20px;" id="formSubtitle">Fill in the details to get started.</p>

    <form id="signupForm" onsubmit="handleSignup(event)" novalidate>
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="John Lim" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" id="phone" class="form-input" placeholder="+60...." required/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Work Email</label>
        <input type="email" id="email" class="form-input" placeholder="yourname@gmail.com" required/>
      </div>

      <div id="employerOnlyField" class="form-group">
        <label class="form-label" for="companyInput">Company Name</label>
        <input 
          list="companyOptions" 
          id="companyInput" 
          class="form-input" 
          placeholder="Type or select a company..."
        >
        <datalist id="companyOptions">
          <option value="Acme Corporation">
          <option value="Global Tech Ltd.">
          <option value="Sunrise Ventures">
        </datalist>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pass-container">
          <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" required/>
          <button type="button" id="togglePass" class="back-btn" onclick="togglePassword('password', 'togglePass')">Show</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="pass-container">
          <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter password" required/>
          <button type="button" id="toggleConfirm" class="back-btn" onclick="togglePassword('confirmPassword', 'toggleConfirm')">Show</button>
        </div>
      </div>

      <div style="font-size: 13px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;" class="terms-container">
        <label style="color: var(--color-text-secondary); display: flex; align-items: center; gap: 5px;" class="checkbox-label">
          <input type="checkbox" id="terms" required/> 
          <span>I agree to the <a href="#">Terms & Conditions</a></span>
        </label>
      </div>

      <button type="submit" id="btnSignup" class="btn-primary">Create Account</button>
    </form>

    <p style="text-align: center; font-size: 13px; margin-top: 20px; color: var(--color-text-secondary);" class="login-redirect">
      Already have an account? <a href="login.html">Login here</a>
    </p>
  </div>

  <script>
const API_BASE_URL = "http://127.0.0.1:8000";
const IS_PREVIEW_MODE = false; // Set to false to use real data

/* ── STATE ── */
let currentRole = 'employer'; 

/**
 * ROLE SWITCHER
 * Ensures UI and logic are synced to backend expectations
 */
function setRole(role) {
    currentRole = role; // Standardized to 'employer' or 'employee'
    
    // UI Feedback
    document.getElementById('btnEmployer').classList.toggle('active', role === 'employer');
    document.getElementById('btnEmployee').classList.toggle('active', role === 'employee');

    const formTitle = document.getElementById('formTitle');
    const employerSection = document.getElementById('employerOnlyField');

    if (role === 'employer') {
        formTitle.textContent = 'Register as Employer';
        if (employerSection) employerSection.style.display = 'block';
    } else {
        formTitle.textContent = 'Register as Employee';
        if (employerSection) employerSection.style.display = 'none';
    }
}

/**
 * SIGNUP HANDLER
 */
async function handleSignup(event) {
    event.preventDefault();

    const btn = document.getElementById('btnSignup');
    
    // 1. Validation Logic
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
        showNotif("Passwords do not match!", "error");
        return;
    }

    if (!document.getElementById('terms').checked) {
        showNotif("You must accept the terms.", "error");
        return;
    }

    // 2. Data Mapping
    // Note: currentRole is strictly 'employer' or 'employee' to match FastAPI models
    const payload = {
        email: document.getElementById('email').value,
        password: password,
        full_name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        role: currentRole,
        company: (currentRole === 'employer') 
                ? document.getElementById('companySelect').value 
                : null,
        accept_terms: document.getElementById('terms').checked
    };

    // 3. Preview Mode Logic
    if (IS_PREVIEW_MODE) {
        console.warn("TalentFlow: Preview Mode Active");
        console.table(payload); // Technical debugging view
        
        btn.disabled = true;
        btn.textContent = "Processing...";

        setTimeout(() => {
            showNotif("Account created! (Preview Mode)", "success");
            setTimeout(() => {
                window.location.href = "login.html"; 
            }, 1500);
        }, 800);
        return;
    }

    // 4. Production API Execution
    try {
        btn.disabled = true;
        btn.textContent = "Processing...";

        const response = await fetch(`${API_BASE_URL}/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
            showNotif("Account created! Redirecting to login...", "success");
            setTimeout(() => {
                window.location.href = "login.html"; 
            }, 2000);
        } else {
            // Catches backend validation errors (e.g., email already exists)
            showNotif(data.detail || "Signup failed", "error");
        }
    } catch (err) {
        console.error("Signup Error:", err);
        showNotif("Connection error. Ensure backend is running.", "error");
    } finally {
        btn.disabled = false;
        btn.textContent = "Create Account";
    }
}

/**
 * UI NOTIFICATIONS
 */
function showNotif(msg, type) {
    const notif = document.getElementById('notif');
    if (!notif) return;
    
    notif.textContent = msg;
    notif.style.display = "block";
    notif.style.color = type === "error" ? "#ff4d4d" : "#00ff88";
    notif.style.marginBottom = "15px";
}

/**
 * PASSWORD TOGGLE
 */
function togglePassword(inputId, btnId) {
    const input = document.getElementById(inputId);
    const btn = document.getElementById(btnId);
    if (!input || !btn) return;

    if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Hide";
    } else {
        input.type = "password";
        btn.textContent = "Show";
    }
}
  </script>
</body>
</html>
