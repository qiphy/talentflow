<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TalentFlow — Sign Up</title>
  <link rel="stylesheet" href="design.css">
  <script src="theme.js"></script>
</head>
<body>

  <div class="auth-card">
    <div class="auth-header">
      <div class="theme-btn-wrapper" style="display: flex; justify-content: flex-end;">
        <button id="themeToggle" onclick="toggleTheme()" class="theme-toggle-btn">
          🌙
        </button>
      </div>
      <h1 class="logo-main">TalentFlow</h1>
      <p>Your first step to the workplace</p>
    </div>

    <div class="role-toggle">
      <button id="btnEmployer" class="active" onclick="setRole('employer')">Employer</button>
      <button id="btnEmployee" onclick="setRole('employee')">Employee</button>
    </div>

    <div id="notif"></div>

    <h2 id="formTitle">Register as Employer</h2>
    <p id="formSubtitle">Fill in the details to get started.</p>

    <form id="signupForm" onsubmit="handleSignup(event)" novalidate>
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="John Lim" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" id="phone" class="form-input" placeholder="+60...." required/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Work Email</label>
        <input type="email" id="email" class="form-input" placeholder="yourname@gmail.com" required/>
      </div>

      <div id="employerOnlyField" class="form-group">
        <label class="form-label">Company Name</label>
        <select id="companySelect" class="form-select">
          <option value="">-- Select company --</option>
          <option>Acme Corporation</option>
          <option>Global Tech Ltd.</option>
          <option>Sunrise Ventures</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pass-container">
          <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" required/>
          <button type="button" id="togglePass" class="back-btn" onclick="togglePassword('password', 'togglePass')">Show</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="pass-container">
          <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter password" required/>
          <button type="button" id="toggleConfirm" class="back-btn" onclick="togglePassword('confirmPassword', 'toggleConfirm')">Show</button>
        </div>
      </div>

      <div class="terms-container">
        <label class="checkbox-label">
          <input type="checkbox" id="terms" required/> 
          <span>I agree to the <a href="#">Terms & Conditions</a></span>
        </label>
      </div>

      <button type="submit" id="btnSignup" class="btn-primary">Create Account</button>
    </form>

    <p class="login-redirect">
      Already have an account? <a href="login.html">Login here</a>
    </p>
  </div>

  <script>
    function setRole(role) {
  currentRole = role;
  
  // 1. Toggle the 'active' class on the buttons
  document.getElementById('btnEmployer').classList.toggle('active', role === 'employer');
  document.getElementById('btnEmployee').classList.toggle('active', role === 'employee');

  // 2. Update the Form UI
  const formTitle = document.getElementById('formTitle');
  const employerSection = document.getElementById('employerOnlyField');

  if (role === 'employer') {
    formTitle.textContent = 'Register as Employer';
    if (employerSection) employerSection.style.display = 'block';
  } else {
    formTitle.textContent = 'Register as Employee';
    if (employerSection) employerSection.style.display = 'none';
  }
}
  </script>
</body>
</html>
