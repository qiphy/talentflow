<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TalentFlow — Login</title>
  <link rel="stylesheet" href="design.css">
  <script src="theme.js"></script>
</head>
<body>

  <div class="auth-card">
    <div class="auth-header">
      <div class="theme-btn-wrapper">
        <button id="themeToggle" onclick="toggleTheme()" class="theme-toggle-btn" aria-label="Toggle Theme">
          ☀️
        </button>
      </div>
      <h1 class="logo-main">TalentFlow</h1>
      <p>Welcome back! Please login to your account.</p>
    </div>

    <div id="notif"></div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      
      <div class="form-group">
        <label class="form-label">Work Email</label>
        <input type="email" id="email" class="form-input" placeholder="yourname@gmail.com" required/>
      </div>

      <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label class="form-label">Password</label>
            <a href="#" class="forgot-link" style="font-size: 12px; margin-bottom: 8px;">Forgot?</a>
        </div>
        <div class="pass-container">
          <input type="password" id="password" class="form-input" placeholder="Enter password" required/>
          <button type="button" id="togglePass" class="back-btn" onclick="togglePassword('password', 'togglePass')">Show</button>
        </div>
      </div>

      <div class="terms-container">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberMe"/> 
          <span>Remember me</span>
        </label>
      </div>

      <button type="submit" id="btnLogin" class="btn-primary">Login</button>
    </form>

    <p class="login-redirect">
      Don't have an account? <a href="signup.html">Register here</a>
    </p>
  </div>

  <script>
    // Simple placeholder for login logic
    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      
      if(!email || !pass) {
        const notif = document.getElementById('notif');
        notif.textContent = "Please fill in all fields.";
        notif.style.color = "red";
      } else {
        console.log("Logging in...", { email });
      }
    }

    function togglePassword(id, btnId) {
      const input = document.getElementById(id);
      const btn = document.getElementById(btnId);
      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Hide";
      } else {
        input.type = "password";
        btn.textContent = "Show";
      }
    }
  </script>
</body>
</html>
